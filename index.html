<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini Test Textures - First / Second / Third</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
}
canvas{
    display:block;
}
#info{
    position:absolute;
    top:10px;
    left:10px;
    color:#fff;
    background:rgba(0,0,0,.7);
    padding:12px;
    border-radius:8px;
    font-family:Arial,Helvetica,sans-serif;
}
</style>
</head>

<body>

<div id="info">
Orbital Controls • Textures :
<br>baking.png
<br>second.png
<br>third.png
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
    }
}
</script>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.179.1/+esm";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/loaders/GLTFLoader.js";

let scene, camera, renderer, controls;

//--------------------------------------------------
// TEXTURES
//--------------------------------------------------

const textureLoader = new THREE.TextureLoader();

const firstTexture = textureLoader.load("./first.jpg");
const secondTexture = textureLoader.load("./second.jpg");
const thirdTexture = textureLoader.load("./third.jpg");
const fifthTexture = textureLoader.load("./fifth.jpg");
const sixthTexture = textureLoader.load("./sixth.jpg");
const sevenTexture = textureLoader.load("./seven.jpg");
const eightTexture = textureLoader.load("./eight.jpg");
const nineTexture = textureLoader.load("./nine.jpg");
const backgroundTexture = textureLoader.load("./background.jpg");



[firstTexture, secondTexture, thirdTexture, fifthTexture, sixthTexture, sevenTexture, eightTexture, nineTexture, backgroundTexture].forEach(texture => {

    texture.flipY = false;
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.minFilter = THREE.LinearMipMapLinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.anisotropy = 16;

});

//--------------------------------------------------
// MATERIAUX
//--------------------------------------------------

const firstMaterial = new THREE.MeshStandardMaterial({
    map: firstTexture,
    roughness: 0.65,
    metalness: 0.05
});

const secondMaterial = new THREE.MeshStandardMaterial({
    map: secondTexture,
    roughness: 0.65,
    metalness: 0.05
});

const thirdMaterial = new THREE.MeshStandardMaterial({
    map: thirdTexture,
    roughness: 0.65,
    metalness: 0.05
});

const fifthMaterial = new THREE.MeshStandardMaterial({
    map: fifthTexture,
    roughness: 0.65,
    metalness: 0.05
});

const sixthMaterial = new THREE.MeshStandardMaterial({
    map: sixthTexture,
    roughness: 0.65,
    metalness: 0.05
});

const sevenMaterial = new THREE.MeshStandardMaterial({
    map: sevenTexture,
    roughness: 0.65,
    metalness: 0.05
});

const eightMaterial = new THREE.MeshStandardMaterial({
    map: eightTexture,
    roughness: 0.65,
    metalness: 0.05
});

const nineMaterial = new THREE.MeshStandardMaterial({
    map: nineTexture,
    roughness: 0.65,
    metalness: 0.05
});

const backgroundMaterial = new THREE.MeshStandardMaterial({
    map: backgroundTexture,
    roughness: 0.65,
    metalness: 0.05
});

//--------------------------------------------------
// INIT
//--------------------------------------------------

init();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color("#D9CAD1");

    camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100
    );

    camera.position.set(6,5,9);

    renderer = new THREE.WebGLRenderer({
        antialias:true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;

    document.body.appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    //--------------------------------------------------
    // LUMIERES
    //--------------------------------------------------

    const sun = new THREE.DirectionalLight(0xffffff,1);
    sun.position.set(8,12,10);
    scene.add(sun);

    scene.add(new THREE.AmbientLight(0xffffff,1));

    //--------------------------------------------------
    // GLB
    //--------------------------------------------------

    const loader = new GLTFLoader();

    loader.load(
        "./scene.glb",

        (gltf)=>{

            const model = gltf.scene;
            scene.add(model);

            let firstCount = 0;
            let secondCount = 0;
            let thirdCount = 0;

            model.traverse((child)=>{

                if(!child.isMesh) return;

                console.log(child.name);

                //--------------------------------------
                // _First
                //--------------------------------------

                if(child.name.includes("First")){

                    child.material = firstMaterial;
                    firstCount++;

                }

                //--------------------------------------
                // _Second
                //--------------------------------------

                else if(child.name.includes("Second")){

                    child.material = secondMaterial;
                    secondCount++;

                }

                //--------------------------------------
                // _Third
                //--------------------------------------

                else if(child.name.includes("Third")){

                    child.material = thirdMaterial;
                    thirdCount++;

                }

                else if(child.name.includes("Fifth")){

                    child.material = fifthMaterial;
                    thirdCount++;

                }

                 else if(child.name.includes("Sixth")){

                    child.material = sixthMaterial;
                    thirdCount++;

                }

                 else if(child.name.includes("Seven")){

                    child.material = sevenMaterial;
                    thirdCount++;

                }

                else if(child.name.includes("Eight")){

                    child.material = eightMaterial;
                    thirdCount++;

                }

                else if(child.name.includes("Nine")){

                    child.material = nineMaterial;
                    thirdCount++;

                }

                else if(child.name.includes("Background")){

                    child.material = backgroundMaterial;
                    thirdCount++;

                }
            });

            console.log("First :", firstCount);
            console.log("Second :", secondCount);
            console.log("Third :", thirdCount);

        },

        undefined,

        (error)=>{

            console.error(error);

        }

    );

    //--------------------------------------------------
    // Resize
    //--------------------------------------------------

    window.addEventListener("resize",()=>{

        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    });

    animate();

}

//--------------------------------------------------
// LOOP
//--------------------------------------------------

function animate(){

    requestAnimationFrame(animate);

    controls.update();

    renderer.render(scene,camera);

}

</script>

</body>
</html>
