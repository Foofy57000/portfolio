<script type="module">
import { Howl } from "https://cdn.jsdelivr.net/npm/howler@2.2.4/+esm";
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.179.1/+esm';
import { OrbitControls } from './util/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/loaders/GLTFLoader.js';
import { gsap } from 'https://cdn.jsdelivr.net/npm/gsap@3.13.0/+esm';

let scene, camera, renderer, controls, raycaster, pointer;
let model, hitboxes = [], currentHover = null;
let isLoaded = false, isModalOpen = false, clickBlocked = false;
let video, videoTexture, chairTop = null;
let xAxisFans = [], yAxisFans = [];

let hourHand;
let minuteHand;
let state = "loading";

let logCameraInterval = null;
let isCameraLogging = true;
let objectsNeedingDelayedHitboxes = [];

// Variables pour animation
let plank1, plank2, workBtn, aboutBtn, contactBtn;


const textureLoader = new THREE.TextureLoader();

const firstTexture = textureLoader.load("textures/first.jpg");
const secondTexture = textureLoader.load("textures/second.jpg");
const thirdTexture = textureLoader.load("textures/third.jpg");
const fifthTexture = textureLoader.load("textures/fifth.jpg");
const sixthTexture = textureLoader.load("textures/sixth.jpg");
const sevenTexture = textureLoader.load("textures/seven.jpg");
const eightTexture = textureLoader.load("textures/eight.jpg");
const nineTexture = textureLoader.load("textures/nine.jpg");
const tenTexture = textureLoader.load("textures/ten.jpg");
const elevenTexture = textureLoader.load("textures/eleven.jpg");
const twelveTexture = textureLoader.load("textures/twelve.jpg");
const thirteenTexture = textureLoader.load("textures/thirteen.jpg");

const fourteenTexture = textureLoader.load("textures/fourteen.jpg");
const fifthteenTexture = textureLoader.load("textures/lalala.jpg");
const seventeenTexture = textureLoader.load("textures/seventeen.jpg");
const backgroundTexture = textureLoader.load("textures/background.jpg");

[
    firstTexture,
    secondTexture,
    thirdTexture,
    fifthTexture,
    sixthTexture,
    sevenTexture,
    eightTexture,
    nineTexture,
    tenTexture,
    elevenTexture,
    twelveTexture,
    thirteenTexture,
    fourteenTexture,
    fifthteenTexture,
    seventeenTexture,
    backgroundTexture
].forEach(texture => {

    texture.flipY = false;
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.minFilter = THREE.LinearMipMapLinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.anisotropy = 16;

});

//--------------------------------------------------
// MATERIAUX
//--------------------------------------------------

const firstMaterial = new THREE.MeshStandardMaterial({
    map: firstTexture,
    roughness: 0.65,
    metalness: 0.05
});

const secondMaterial = new THREE.MeshStandardMaterial({
    map: secondTexture,
    roughness: 0.65,

});

const thirdMaterial = new THREE.MeshStandardMaterial({
    map: thirdTexture,
    roughness: 0.65,
    metalness: 0.05
});

const fifthMaterial = new THREE.MeshStandardMaterial({
    map: fifthTexture,
    roughness: 0.65,
    metalness: 0.05
});

const sixthMaterial = new THREE.MeshStandardMaterial({
    map: sixthTexture,
    roughness: 0.65,
    metalness: 0.05
});

const sevenMaterial = new THREE.MeshStandardMaterial({
    map: sevenTexture,
    roughness: 0.65,
    metalness: 0.05
});

const eightMaterial = new THREE.MeshStandardMaterial({
    map: eightTexture,
    roughness: 0.65,
    metalness: 0.05
});

const nineMaterial = new THREE.MeshStandardMaterial({
    map: nineTexture,
    roughness: 0.65,
    metalness: 0.05
});

const tenMaterial = new THREE.MeshStandardMaterial({
    map: tenTexture,
    roughness: 0.65,
    metalness: 0.05
});

const elevenMaterial = new THREE.MeshStandardMaterial({
    map: elevenTexture,
    roughness: 0.65,
    metalness: 0.05
});

const twelveMaterial = new THREE.MeshStandardMaterial({
    map: twelveTexture,
    roughness: 0.65,
    metalness: 0.05
});

const thirteenMaterial = new THREE.MeshStandardMaterial({
    map: thirteenTexture,
    roughness: 0.65,
    metalness: 0.05
});

const fourteenMaterial = new THREE.MeshStandardMaterial({
    map: fourteenTexture,
    roughness: 0.65,
    metalness: 0.05
});

const fifthteenMaterial = new THREE.MeshStandardMaterial({
    map: fifthteenTexture,
    roughness: 0.65,
    metalness: 0.05
});

const seventeenMaterial = new THREE.MeshStandardMaterial({
    map: seventeenTexture,
    roughness: 0.65,
    metalness: 0.05
});

const backgroundMaterial = new THREE.MeshStandardMaterial({
    map: backgroundTexture,
    roughness: 0.65,
    metalness: 0.05
});


const mySwiper = new Swiper(".mySwiper", {
    loop: true,
    speed: 600,
    pagination: {
        el: ".swiper-pagination",
        clickable: true
    },
    navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev"
    },
    keyboard: {
        enabled: true
    },
    grabCursor: true,
});

function updateMuteIcon() {
    const soundOn = document.querySelector(".sound-on-svg");
    const soundOff = document.querySelector(".sound-off-svg");
    soundOn.style.display = isMuted ? "none" : "block";
    soundOff.style.display = isMuted ? "block" : "none";
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 200);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.minDistance = 5; 
    controls.maxDistance = 45;
    controls.minPolarAngle = 0; 
    controls.maxPolarAngle = Math.PI / 2;
    controls.minAzimuthAngle = 0; 
    controls.maxAzimuthAngle = Math.PI / 2;
    controls.enableDamping = true; 
    controls.dampingFactor = 0.05;


  

    
camera.position.set(
   13.175,
    0.735,
    18.445
  );
  controls.target.set(
    -1.618,
    -6.074,
    4.485
  );

    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 1.7));
    const light = new THREE.DirectionalLight(0xffffff, 1.7);
    light.position.set(5, 10, 50);
    scene.add(light);

    raycaster = new THREE.Raycaster();
    pointer = new THREE.Vector2();

    const manager = new THREE.LoadingManager();
    manager.onLoad = () => {
        state = "ready";
        const btn = document.getElementById("enter");
        const silentBtn = document.getElementById("enter-silent");

        btn.disabled = false;
        silentBtn.disabled = false;
        btn.textContent = "Enter";
        silentBtn.textContent = "Enter (sans son)";

        btn.style.cursor = "pointer";
        silentBtn.style.cursor = "pointer";
        silentBtn.style.border = "4px solid #2a0f4e";
        silentBtn.style.background = "#401d49";
        silentBtn.style.color = "#e6dede";
        silentBtn.style.boxShadow = "rgba(0,0,0,.24) 0px 3px 8px";

        gsap.fromTo(btn, {opacity:0, scale:0.8}, {opacity:1, scale:1, duration:0.6, ease:"back.out(1.8)"});
        gsap.fromTo(silentBtn, {opacity:0, scale:0.8}, {opacity:1, scale:1, duration:0.6, ease:"back.out(1.8)", delay: 0.2});
    };

    const loader = new GLTFLoader(manager);
    loader.load("scene.glb", (gltf) => {
        model = gltf.scene;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        model.position.sub(box.getCenter(new THREE.Vector3()));

        video = document.createElement("video");
        video.src = "videos/video.mp4";
        video.crossOrigin = "anonymous";
        video.loop = true; 
        video.muted = true; 
        video.autoplay = true; 
        video.playsInline = true;
        video.play();

        videoTexture = new THREE.VideoTexture(video);
        videoTexture.flipY = false;
        videoTexture.minFilter = videoTexture.magFilter = THREE.LinearFilter;

        model.traverse((child) => {
            if (!child.isMesh) return;

            const name = child.name || "";

            //--------------------------------------------------
// Attribution des textures
//--------------------------------------------------

if (name.includes("First")) {
    child.material = firstMaterial;
}

else if (name.includes("Second")) {
    child.material = secondMaterial;
}

else if (name.includes("Third")) {
    child.material = thirdMaterial;
}

else if (name.includes("Fifth")) {
    child.material = fifthMaterial;
}

else if (name.includes("Sixth")) {
    child.material = sixthMaterial;
}

else if (name.includes("Seven")) {
    child.material = sevenMaterial;
}

else if (name.includes("Eight")) {
    child.material = eightMaterial;
}

else if (name.includes("Nine")) {
    child.material = nineMaterial;
}

else if (name.includes("Ten")) {
    child.material = tenMaterial;
}

else if (name.includes("eleven")) {
    child.material = elevenMaterial;
}

else if (name.includes("twelve")) {
    child.material = twelveMaterial;
}

else if (name.includes("Thirteen")) {
    child.material = thirteenMaterial;
}

else if (name.includes("Fourteen")) {
    child.material = fourteenMaterial;
}

else if (name.includes("lalala")) {
    child.material = fifthteenMaterial;
}

else if (name.includes("Prout")) {
    child.material = seventeenMaterial;
}


else if (name.includes("Background")) {
    child.material = backgroundMaterial;
}

            child.userData.initialScale = child.scale.clone();
            child.userData.initialPosition = child.position.clone();
            child.userData.initialRotation = child.rotation.clone();

             if (child.name.includes("Hour_Hand")) {
        hourHand = child;
        child.userData.initialRotation = new THREE.Euler().copy(child.rotation);
      }

      if (child.name.includes("Minute_Hand")) {
        minuteHand = child;
        child.userData.initialRotation = new THREE.Euler().copy(child.rotation);
      }

            if (name.includes("Screen")) {
                child.material = new THREE.MeshBasicMaterial({ map: videoTexture });
            }

            if (name.includes("Chair_Top") || (child.parent && child.parent.name.includes("Chair_Top"))) {
                chairTop = child.name.includes("Chair_Top") ? child : child.parent;
                if (chairTop && !chairTop.userData.initialRotation) {
                    chairTop.userData.initialRotation = chairTop.rotation.clone();
                }
            }

            if (name.toLowerCase().includes("fan")) {
                if (name.toLowerCase().includes("fan_2")) xAxisFans.push(child);
                else yAxisFans.push(child);
            }

            if (name.includes("Hanging_Plank_1")) plank1 = child;
            else if (name.includes("Hanging_Plank_2")) plank2 = child;
            else if (name.includes("My_Work")) workBtn = child;
            else if (name.includes("About")) aboutBtn = child;
            else if (name.includes("Contact")) contactBtn = child;

            if (name.includes("Hanging_Plank_1")) {
                child.scale.set(0, 0, 1);
            } else if (name.includes("Hanging_Plank_2") || name.includes("My_Work") || 
                       name.includes("About") || name.includes("Contact") || 
                       name.includes("_Projet") || name.includes("_Target") || name.includes("_Raycaster") || name.includes("_Letters")) {
                child.scale.set(0, 0, 0);
            }
        });

        createHitboxes(model);
    });

    window.addEventListener("mousemove", onMove);
    window.addEventListener("click", onClick);
    window.addEventListener("resize", onResize);

    document.getElementById("enter").onclick = () => {
        if (state !== "ready") return;
        isMuted = false;
        backgroundMusic.volume(1);
        buttonSounds.click.mute(false);
        updateMuteIcon();
        handleEnter();
        backgroundMusic.play();
    };

    document.getElementById("enter-silent").onclick = () => {
        if (state !== "ready") return;
        isMuted = true;
        backgroundMusic.volume(0);
        buttonSounds.click.mute(true);
        updateMuteIcon();
        handleEnter();
    };

    updateMuteIcon();
    setupModals();
}

function setupModals() {
    const closeModals = () => {
        document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
        isModalOpen = false;
        controls.enabled = true;
        clickBlocked = true;
        buttonSounds.click.play();
        setTimeout(() => clickBlocked = false, 250);
    };

    document.querySelectorAll('.closeModal').forEach(btn => {
        btn.addEventListener('click', closeModals);
    });

    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', e => {
            if (e.target === modal) closeModals();
        });
    });

    window.addEventListener("keydown", e => {
        if (e.key === "Escape") closeModals();
    });
}

function playIntroAnimation() {
    const tl = gsap.timeline({ defaults: { duration: 0.6, ease: "back.out(2)" } });

    const lettersTl = gsap.timeline({ defaults: { duration: 0.6, ease: "back.out(2)" } });
    const letters = [];

    model.traverse((child) => {
        if (!child.isMesh) return;
        const name = child.name || "";

        if (name.includes("_Target") || name.includes("_Raycaster")) {
            const delay = Math.random() * 0.5;
            tl.to(child.scale, { x: child.userData.initialScale.x, y: child.userData.initialScale.y, z: child.userData.initialScale.z }, delay)
              .fromTo(child.position, { y: child.userData.initialPosition.y - 0.25 }, { y: child.userData.initialPosition.y, duration: 0.5, ease: "back.out(2)" }, "<");
        }

        if (name.includes("_Letters")) letters.push(child);
    });

    letters.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
    letters.forEach((letter, index) => {
        lettersTl.to(letter.scale, { x: letter.userData.initialScale.x, y: letter.userData.initialScale.y, z: letter.userData.initialScale.z }, index * 0.1)
                 .fromTo(letter.position, { y: letter.userData.initialPosition.y - 0.25 }, { y: letter.userData.initialPosition.y, duration: 0.5, ease: "back.out(2)" }, "<");
    });

    const t1 = gsap.timeline({ defaults: { duration: 0.8, ease: "back.out(1.8)" } });
t1.timeScale(0.8);

if (plank1) {
    t1.to(plank1.scale, {
        x: plank1.userData.initialScale.x,
        y: plank1.userData.initialScale.y,
        z: plank1.userData.initialScale.z
    });
}

if (plank2) {
    t1.to(plank2.scale, {
        x: plank2.userData.initialScale.x,
        y: plank2.userData.initialScale.y,
        z: plank2.userData.initialScale.z
    }, "-=0.5");
}

if (workBtn) {
    t1.to(workBtn.scale, {
        x: workBtn.userData.initialScale.x,
        y: workBtn.userData.initialScale.y,
        z: workBtn.userData.initialScale.z
    }, "-=0.6");
}

if (aboutBtn) {
    t1.to(aboutBtn.scale, {
        x: aboutBtn.userData.initialScale.x,
        y: aboutBtn.userData.initialScale.y,
        z: aboutBtn.userData.initialScale.z
    }, "-=0.6");
}

if (contactBtn) {
    t1.to(contactBtn.scale, {
        x: contactBtn.userData.initialScale.x,
        y: contactBtn.userData.initialScale.y,
        z: contactBtn.userData.initialScale.z
    }, "-=0.6");
}

    t1.eventCallback("onComplete", () => createDelayedHitboxes());
}

function handleEnter() {
    state = "running";
    const loading = document.getElementById("loading-screen");
    const btn = document.getElementById("enter");
    const silentBtn = document.getElementById("enter-silent");

    btn.disabled = true;
    silentBtn.disabled = true;
    btn.style.cursor = "default";
    btn.style.boxShadow = "none";
    btn.style.border = "4px solid #6e5e9c";
    btn.style.background = "#ead7ef";
    btn.style.color = "#6e5e9c";
    btn.textContent = "~ Bonjour ~";
    loading.style.background = "#ead7ef";
    silentBtn.style.display = "none"

    playReveal();
}

function playReveal() {
    const tl = gsap.timeline({
        onComplete: () => {
            document.getElementById("loading-screen").remove();
            isLoaded = true;
            playIntroAnimation();
        }
    });

    tl.to("#loading-screen", { scale: 0.5, duration: 1.2, ease: "back.in(1.8)" })
      .to("#loading-screen", { y: "200vh", rotateX: 45, rotateY: -35, transformPerspective: 1000, duration: 1.2, ease: "back.in(1.8)" }, "-=0.1");
}

// ================= HITBOXES =================
function createHitboxes(root) {
    root.traverse((obj) => {
        if (!obj.isMesh) return;

        let targetObject = null;
        let current = obj;
        while (current) {
            const name = current.name || "";
            if (name.includes("_Manga") || name.includes("Manga") ||
                name.includes("_Raycaster") || name.includes("Raycaster") ||
                name.includes("_Target") || name.includes("_Projet") || name.includes("_Letters")) {
                targetObject = current;
                break;
            }
            current = current.parent;
        }

        const name = obj.name || "";
        if (!targetObject && !name.includes("_Target") && !name.includes("_Projet")) return;

        if (name.includes("_Projet") || name.includes("_Raycaster") || name.includes("_Target") ||
            name.includes("Hanging_Plank") || name.includes("My_Work") || 
            name.includes("About") || name.includes("Contact") || name.includes("_Letters")) {
            objectsNeedingDelayedHitboxes.push(obj);
            return;
        }

        createSingleHitbox(obj, targetObject);
    });
}

function createSingleHitbox(originalObj, targetObject) {
    originalObj.updateWorldMatrix(true, false);
    const box = new THREE.Box3().setFromObject(originalObj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    const hit = new THREE.Mesh(
        new THREE.BoxGeometry(size.x * 1, size.y * 1, size.z * 1),
        new THREE.MeshBasicMaterial({ wireframe: true, color: 0xff00ff, transparent: true, opacity: 0.25 })
    );

    hit.position.copy(center);
    hit.userData.target = targetObject || originalObj;

    scene.add(hit);
    hitboxes.push(hit);
}

function createDelayedHitboxes() {
    objectsNeedingDelayedHitboxes.forEach(obj => {
        const savedScale = obj.scale.clone();
        obj.scale.copy(obj.userData.initialScale || new THREE.Vector3(1,1,1));
        createSingleHitbox(obj);
        obj.scale.copy(savedScale);
    });
    objectsNeedingDelayedHitboxes = [];
}

function getType(obj) {
    if (!obj) return null;
    let current = obj;
    while (current) {
        const n = current.name || "";
        if (n.includes("_Projet")) return "projet";
        if (n.includes("_Raycaster")) return "raycaster";
        if (n.includes("_Target")) return "target";
        if (n.includes("_Manga") || n.includes("Manga")) return "manga";
        current = current.parent;
    }
    return null;
}

// ================= HOVER =================
function applyHover(obj, isHovering) {
    if (!obj || !obj.userData) return;

    if (!obj.userData.initialScale) obj.userData.initialScale = obj.scale.clone();
    if (!obj.userData.initialPosition) obj.userData.initialPosition = obj.position.clone();
    if (!obj.userData.initialRotation) obj.userData.initialRotation = obj.rotation.clone();

    const base = obj.userData.initialScale;
    const basePos = obj.userData.initialPosition;

    gsap.killTweensOf(obj.scale);
    gsap.killTweensOf(obj.position);
    gsap.killTweensOf(obj.rotation);

    const type = getType(obj);

    if (type === "manga") {
        gsap.to(obj.scale, { x: isHovering ? base.x * 1.2 : base.x, y: isHovering ? base.y * 1.2 : base.y, z: isHovering ? base.z * 1.2 : base.z, duration: 0.25, ease: "power2.out" });
        gsap.to(obj.position, { y: isHovering ? basePos.y + 0.4 : basePos.y, duration: 0.25, ease: "power2.out" });
    } 
    else if (type === "raycaster") {
        const targetScale = isHovering ? 1.7 : 1;
        gsap.to(obj.scale, { x: base.x * targetScale, y: base.y * targetScale, z: base.z * targetScale, duration: 0.2 });
    } 
    else if (obj.name.includes("About_Button")) {
        const targetScale = isHovering ? 1.4 : 1;
        gsap.to(obj.scale, { x: base.x * targetScale, y: base.y * targetScale, z: base.z * targetScale, duration: 0.2 });
        const targetRotationX = isHovering ? obj.userData.initialRotation.x - Math.PI / 10 : obj.userData.initialRotation.x;
        gsap.to(obj.rotation, { x: targetRotationX, duration: 0.5, ease: isHovering ? "back.out(2)" : "power2.out" });
    } 
    else if (type === "projet") {
        const targetScale = isHovering ? 1.4 : 1;
        gsap.to(obj.scale, { x: base.x * targetScale, y: base.y * targetScale, z: base.z * targetScale, duration: 0.2 });
        gsap.to(obj.rotation, { x: obj.userData.initialRotation.x + (isHovering ? Math.PI / 10 : 0), duration: 0.5, ease: "back.out(2)" });
    } 
    else if (type === "target") {
        gsap.to(obj.rotation, { x: obj.userData.initialRotation.x + (isHovering ? Math.PI / 10 : 0), duration: 0.5, ease: "back.out(2)" });
    } 
    else if (obj.name.includes("_Letters")) {
        gsap.to(obj.position, { y: isHovering ? basePos.y + 0.4 : basePos.y, duration: 0.25, ease: "power2.out" });
    }
}

function resetHover() {
    if (!currentHover) return;
    applyHover(currentHover, false);
    currentHover = null;
}

function handleHover() {
    if (!isLoaded || isModalOpen) return;

    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(hitboxes);

    if (!hits.length) {
        resetHover();
        document.body.style.cursor = "default";
        return;
    }

    const target = hits[0].object.userData.target;
    const name = target ? target.name : "";

    const shouldShowPointer = name.includes("_Target") || name.includes("_Projet");

    if (target === currentHover) {
        document.body.style.cursor = shouldShowPointer ? "pointer" : "default";
        return;
    }

    resetHover();
    currentHover = target;
    applyHover(target, true);
    document.body.style.cursor = shouldShowPointer ? "pointer" : "default";
}

// ================= INTERACTIONS =================
function onClick() {
    if (isModalOpen || clickBlocked) return;
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(hitboxes);
    if (!hits.length) return;

    const obj = hits[0].object.userData.target;
    const type = getType(obj);

    if (type === "manga") {
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const offset = new THREE.Vector3(0, 3, 1);
        const newCamPos = center.clone().add(offset);

        controls.enabled = false;
        gsap.to(camera.position, { x: newCamPos.x, y: newCamPos.y, z: newCamPos.z, duration: 1.2, ease: "power2.inOut" });
        gsap.to(controls.target, { 
            x: center.x, y: center.y, z: center.z, duration: 1.2, ease: "power2.inOut",
            onUpdate: () => controls.update(),
            onComplete: () => controls.enabled = true
        });
        return;
    }

    if (obj.name.includes("About")) {
        document.getElementById("modal-about").style.display = "flex";
        isModalOpen = true;
        controls.enabled = false;
        buttonSounds.click.play();
        return;
    }

    if (obj.name.includes("My_Work")) {
        document.getElementById("modal-work").style.display = "flex";
        isModalOpen = true;
        controls.enabled = false;
        buttonSounds.click.play();
        return;
    }

    if (obj.name.includes("Contact")) {
        document.getElementById("modal-contact").style.display = "flex";
        isModalOpen = true;
        controls.enabled = false;
        buttonSounds.click.play();
        return;
    }
}

function onMove(e) {
    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

const clock = new THREE.Clock();

const updateClockHands = () => {
  if (!hourHand || !minuteHand) return;

  const now = new Date();
  const hours = now.getHours() % 12;
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();

  const minuteAngle = (minutes + seconds / 60) * ((Math.PI * 2) / 60);

  const hourAngle = (hours + minutes / 60) * ((Math.PI * 2) / 12);

  minuteHand.rotation.x = -minuteAngle;
  hourHand.rotation.x = -hourAngle;
};

function animate() {
    requestAnimationFrame(animate);

    
    controls.update();

    updateClockHands();

    xAxisFans.forEach(fan => fan.rotation.x -= 0.04);
    yAxisFans.forEach(fan => fan.rotation.y -= 0.04);

    if (chairTop && chairTop.userData.initialRotation) {
        const time = performance.now() * 0.001;
        const baseAmplitude = Math.PI / 8;
        const rotationOffset = baseAmplitude * Math.sin(time * 0.5) * (1 - Math.abs(Math.sin(time * 0.5)) * 0.3);
        chairTop.rotation.y = chairTop.userData.initialRotation.y + rotationOffset;
    }

    if (isLoaded) handleHover();
    renderer.render(scene, camera);
}

// ================= AUDIO =================
const buttonSounds = { click: new Howl({ src: ["/audio/sfx/click/bubble.ogg"], preload: true, volume: 0.5 }) };
const backgroundMusic = new Howl({ src: ["/audio/music/cosmic_candy.ogg"], loop: true, volume: 1 });

let isMuted = false;
const muteToggleButton = document.querySelector(".mute-toggle-button");

function handleMuteToggle(e) {
    e.preventDefault();
    isMuted = !isMuted;
    backgroundMusic.volume(isMuted ? 0 : 1);
    buttonSounds.click.mute(isMuted);
    buttonSounds.click.play();

    if (!backgroundMusic.playing()) backgroundMusic.play();

    gsap.to(muteToggleButton, {
        rotate: 0, scale: 1, duration: 0.5, ease: "back.out(2)",
        onStart: () => {
            document.querySelector(".sound-off-svg").style.display = isMuted ? "block" : "none";
            document.querySelector(".sound-on-svg").style.display = isMuted ? "none" : "block";
        },
        onComplete: () => gsap.set(muteToggleButton, { clearProps: "all" })
    });
}

muteToggleButton.addEventListener("click", handleMuteToggle);
muteToggleButton.addEventListener("touchend", handleMuteToggle);

init();
animate();

// ================= CAMERA DEBUG =================
const debugPanel = document.getElementById('camera-debug');
let cameraLogInterval = null;

function updateCameraDebug() {
    if (!camera || !controls) return;

    const pos = camera.position;
    const target = controls.target;

    document.getElementById('cam-pos').textContent = 
        pos.x.toFixed(3) + ', ' + pos.y.toFixed(3) + ', ' + pos.z.toFixed(3);

    document.getElementById('cam-target').textContent = 
        target.x.toFixed(3) + ', ' + target.y.toFixed(3) + ', ' + target.z.toFixed(3);

    const dist = pos.distanceTo(target).toFixed(2);
    document.getElementById('cam-dist').textContent = dist;
}

// Toggle avec la touche "L" (comme "Log")
window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'l') {
        const isVisible = debugPanel.style.display !== 'none';
        debugPanel.style.display = isVisible ? 'none' : 'block';

        if (!isVisible) {
            if (!cameraLogInterval) {
                cameraLogInterval = setInterval(updateCameraDebug, 50); // 20 fps update
            }
        } else {
            clearInterval(cameraLogInterval);
            cameraLogInterval = null;
        }
    }
});

// Mise à jour au début
setTimeout(() => {
    if (debugPanel) debugPanel.style.display = 'block';
    if (!cameraLogInterval) cameraLogInterval = setInterval(updateCameraDebug, 80);
}, 1500);
</script>
